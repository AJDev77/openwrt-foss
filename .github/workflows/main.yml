name: Build Linksys MX4200/MX4300 Images

on: workflow_dispatch

jobs:
    build:
        name: Build Linksys MX4200/MX4300 Images
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Install packages
              run: |
                  sudo apt-get update && \
                  sudo apt install -y build-essential \
                  clang \
                  flex \
                  bison \
                  g++ \
                  gawk \
                  gcc-multilib \
                  g++-multilib \
                  gettext \
                  git \
                  libncurses5-dev \
                  libssl-dev \
                  python3-setuptools \
                  rsync \
                  swig \
                  unzip \
                  zlib1g-dev \
                  file \
                  wget && \
                  sudo apt-get clean
                  
            - name: Checkout
              uses: actions/checkout@v4
              with:
                ref: ${{ github.event.ref }}

            - name: Update feeds
              run:  scripts/feeds update -a && scripts/feeds install -a

            - name: Generate config
              run:  sh genconfig-ipq807x.sh

            - name: Print
              run:  cat .config

            - name: Pre-download
              run: make download -j$(nproc) V=s

            - name: Build firmware images
              run: make -j5 V=s

            - name: Get SHA
              uses: benjlevesque/short-sha@v2.2

            - name: Release
              uses: ncipollo/release-action@v1
              with:
                tag: mx4x00-${{ env.SHA }}
                commit: ${{ github.event.ref }}
                allowUpdates: true
                artifacts: bin/targets/qualcommax/ipq807x/openwrt*-qualcommax-ipq807x-linksys_mx4*
